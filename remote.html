<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>OKIŁ — Pilot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #111;
      --bezel: #1a1a1a;
      --btn:   #222;
      --btn-h: #2a2a2a;
      --acc:   #c00;
      --text:  #ddd;
      --dim:   #666;
      --rad:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 32px;
      gap: 14px;
      overscroll-behavior: none;
    }

    /* Status bar */
    #statusBar {
      width: 100%;
      max-width: 380px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .72rem;
      letter-spacing: .08em;
      color: var(--dim);
      padding: 0 2px;
    }
    #dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #444; margin-right: 6px;
      display: inline-block; vertical-align: middle;
      transition: background .3s;
    }
    #dot.on  { background: #0f0; box-shadow: 0 0 6px #0f08; }
    #dot.err { background: #f00; }

    /* Remote body */
    .remote {
      width: 100%;
      max-width: 380px;
      background: var(--bezel);
      border-radius: 24px;
      padding: 20px 16px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: 0 8px 32px #0008, inset 0 1px 0 #ffffff08;
    }

    .remote-brand {
      text-align: center;
      font-size: .7rem;
      letter-spacing: .25em;
      color: var(--dim);
    }

    /* Sekcja kanałów */
    .ch-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    #chDisplay {
      font-size: 1.6rem;
      letter-spacing: .1em;
      color: #fff;
      min-width: 80px;
      text-align: center;
    }

    /* Siatka przycisków D-pad */
    .dpad {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 6px;
      width: 160px;
      margin: 0 auto;
    }
    .dpad-center {
      grid-column: 2; grid-row: 2;
    }

    /* Przyciski transportu */
    .transport {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .transport-wide {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* Głośność */
    .vol-row {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }
    .vol-label {
      font-size: .65rem;
      letter-spacing: .12em;
      color: var(--dim);
      min-width: 24px;
      text-align: center;
    }
    #volSlider {
      flex: 1;
      max-width: 220px;
      accent-color: var(--acc);
      height: 4px;
    }

    /* Separator */
    .sep {
      font-size: .6rem;
      letter-spacing: .18em;
      color: var(--dim);
      text-align: center;
    }

    /* Przyciski — bazowy styl */
    button {
      background: var(--btn);
      color: var(--text);
      border: none;
      border-radius: var(--rad);
      font-family: inherit;
      font-size: .85rem;
      letter-spacing: .06em;
      padding: 14px 6px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background .1s, transform .08s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      line-height: 1;
    }
    button:active {
      background: #383838;
      transform: scale(.93);
    }
    button .ico { font-size: 1.3rem; }
    button .lbl { font-size: .55rem; letter-spacing: .1em; color: var(--dim); }

    /* Warianty kolorów */
    button.red   { color: #ff5555; }
    button.green { color: #55ff88; }
    button.blue  { color: #5599ff; }
    button.yel   { color: #ffdd55; }
    button.acc   { background: #2a0000; color: #ff4444; }
    button.accent-ch { background: #001a2a; color: #55aaff; font-size: 1.2rem; padding: 12px 20px; border-radius: 50%; width: 52px; height: 52px; }
  </style>
</head>
<body>

<div id="statusBar">
  <div><span id="dot"></span><span id="statusTxt">łączenie...</span></div>
  <div id="chDisplay">CH —</div>
</div>

<div class="remote">
  <div class="remote-brand">◈ OKIŁ VHS REMOTE ◈</div>

  <!-- Kanały -->
  <div class="sep">KANAŁY</div>
  <div class="ch-row">
    <button class="accent-ch" data-cmd="ch-dn">▼</button>
    <button class="accent-ch" data-cmd="ch-up">▲</button>
  </div>

  <!-- Cyfry kanałów 1–12 -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">
    <button data-cmd="ch-1">1</button>
    <button data-cmd="ch-2">2</button>
    <button data-cmd="ch-3">3</button>
    <button data-cmd="ch-4">4</button>
    <button data-cmd="ch-5">5</button>
    <button data-cmd="ch-6">6</button>
    <button data-cmd="ch-7">7</button>
    <button data-cmd="ch-8">8</button>
    <button data-cmd="ch-9">9</button>
    <button data-cmd="ch-10">10</button>
    <button data-cmd="ch-11">11</button>
    <button data-cmd="ch-12">12</button>
  </div>

  <!-- Głośność -->
  <div class="sep">GŁOŚNOŚĆ</div>
  <div class="vol-row">
    <button style="padding:10px 14px;border-radius:8px;" data-cmd="vol-dn"><span class="ico">🔉</span></button>
    <input type="range" id="volSlider" min="0" max="100" value="85"/>
    <button style="padding:10px 14px;border-radius:8px;" data-cmd="vol-up"><span class="ico">🔊</span></button>
  </div>

  <!-- Transport VCR -->
  <div class="sep">TRANSPORT</div>
  <div class="transport">
    <button data-cmd="rew">  <span class="ico">⏮</span><span class="lbl">REW</span></button>
    <button data-cmd="play" class="green"><span class="ico">▶</span><span class="lbl">PLAY</span></button>
    <button data-cmd="pause"><span class="ico">⏸</span><span class="lbl">PAUSE</span></button>
    <button data-cmd="ff">  <span class="ico">⏭</span><span class="lbl">FF</span></button>
  </div>
  <div class="transport-wide">
    <button data-cmd="stop" class="red"><span class="ico">■</span><span class="lbl">STOP</span></button>
    <button data-cmd="rec"  class="acc"><span class="ico">⏺</span><span class="lbl">REC</span></button>
  </div>

  <!-- Dodatkowe -->
  <div class="sep">INNE</div>
  <div class="transport-wide">
    <button data-cmd="eject"><span class="ico">⏏</span><span class="lbl">EJECT</span></button>
    <button data-cmd="settings"><span class="ico">⚙</span><span class="lbl">USTAW.</span></button>
  </div>

</div>

<script>
  const dot       = document.getElementById('dot');
  const statusTxt = document.getElementById('statusTxt');
  const chDisplay = document.getElementById('chDisplay');
  const volSlider = document.getElementById('volSlider');

  let chCount = 12; // aktualizowane z ramówki

  // ── WebSocket ──────────────────────────────────────────────────────────────
  let ws, reconnTimer;

  function connect() {
    const wsUrl = `ws://${location.host}`;
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      dot.className = 'on';
      statusTxt.textContent = 'połączono';
      clearTimeout(reconnTimer);
    };
    ws.onclose = () => {
      dot.className = 'err';
      statusTxt.textContent = 'brak połączenia — próba za 3s';
      reconnTimer = setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();

    // Odbierz stan od odtwarzacza (synchronizacja CH + ramówka)
    ws.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        if (d.ch  !== undefined) chDisplay.textContent = `CH ${d.ch}`;
        if (d.vol !== undefined) volSlider.value = Math.round(d.vol * 100);
        if (d.type === 'schedule' && d.data?.channels) chCount = d.data.channels.length || 12;
      } catch {}
    };
  }
  connect();

  function send(cmd, extra = {}) {
    if (ws?.readyState === 1) ws.send(JSON.stringify({ cmd, ...extra }));
  }

  // ── Przyciski ──────────────────────────────────────────────────────────────
  document.querySelectorAll('button[data-cmd]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cmd = btn.dataset.cmd;
      if (cmd === 'ch-up') {
        send('ch-up');
      } else if (cmd === 'ch-dn') {
        send('ch-dn');
      } else if (cmd.startsWith('ch-') && !isNaN(cmd.slice(3))) {
        const n = parseInt(cmd.slice(3));
        if (n >= 1 && n <= chCount) send('ch-set', { ch: n });
      } else {
        send(cmd);
      }
    });
  });

  // Slider głośności
  volSlider.addEventListener('input', () => {
    send('vol-set', { vol: volSlider.value / 100 });
  });

  // Haptyka na mobile
  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.vibrate?.(30);
    });
  });
</script>
</body>
</html>
